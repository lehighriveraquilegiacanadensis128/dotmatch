name: Benchmark evidence request
description: Propose, question, or reproduce benchmark evidence.
title: "[Benchmark]: "
labels: ["benchmark", "evidence", "needs-triage"]
body:
  - type: textarea
    id: statement
    attributes:
      label: Statement
      description: State the exact wording being proposed or questioned.
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Commands
      description: Include exact DotMatch and comparator commands.
      render: bash
    validations:
      required: true
  - type: textarea
    id: artifacts
    attributes:
      label: Artifacts
      description: Point to raw CSVs, reports, figures, gate output, and validation evidence.
    validations:
      required: true
  - type: dropdown
    id: data_status
    attributes:
      label: Data Status
      options:
        - Synthetic fixture
        - Public dataset
        - Restricted dataset, not shareable
    validations:
      required: true
