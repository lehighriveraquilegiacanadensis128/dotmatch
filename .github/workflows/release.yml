name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  wheel:
    name: Build ${{ matrix.os }} wheel
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install build tooling
        run: python -m pip install build
      - name: Build and verify wheel
        run: python scripts/check_python_wheel.py --out-dir dist
      - uses: actions/upload-artifact@v7
        with:
          name: dotmatch-wheel-${{ runner.os }}
          path: dist/*.whl

  sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install build tooling
        run: python -m pip install build
      - name: Build source distribution
        run: python -m build --sdist --outdir dist
      - uses: actions/upload-artifact@v7
        with:
          name: dotmatch-sdist
          path: dist/*.tar.gz

  github-release:
    name: Create GitHub release artifacts
    if: startsWith(github.ref, 'refs/tags/')
    needs: [wheel, sdist]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS.txt
      - uses: softprops/action-gh-release@v3
        with:
          draft: true
          generate_release_notes: true
          files: |
            dist/*.whl
            dist/*.tar.gz
            dist/SHA256SUMS.txt
